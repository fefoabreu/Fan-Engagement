<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#060912"/>
    </linearGradient>
    <radialGradient id="glowGreen" cx="12%" cy="-8%" r="62%">
      <stop offset="0%" stop-color="#1c6e5a" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#1c6e5a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBlue" cx="100%" cy="115%" r="62%">
      <stop offset="0%" stop-color="#0a6ed1" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#0a6ed1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ball" cx="38%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#ff9a5c"/>
      <stop offset="55%" stop-color="#ff7a45"/>
      <stop offset="100%" stop-color="#d8531f"/>
    </radialGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d428a"/>
      <stop offset="100%" stop-color="#c8102e"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowGreen)"/>
  <rect width="1200" height="630" fill="url(#glowBlue)"/>

  <!-- subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.035" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- basketball (bleeds off the right edge) -->
  <g transform="translate(1090,300)">
    <circle cx="0" cy="0" r="220" fill="#2899f5" fill-opacity="0.10"/>
    <circle cx="0" cy="0" r="172" fill="url(#ball)"/>
    <g fill="none" stroke="#161616" stroke-width="7.5" stroke-linecap="round">
      <circle cx="0" cy="0" r="172"/>
      <line x1="0" y1="-172" x2="0" y2="172"/>
      <line x1="-172" y1="0" x2="172" y2="0"/>
      <path d="M0 -172 C-106 -77, -106 77, 0 172"/>
      <path d="M0 -172 C106 -77, 106 77, 0 172"/>
    </g>
  </g>

  <!-- top brand row -->
  <g transform="translate(80,74)" font-family="'Helvetica Neue',Arial,sans-serif">
    <rect x="0" y="0" width="50" height="50" rx="13" fill="url(#mark)"/>
    <rect x="21" y="12" width="8" height="26" rx="4" fill="#ffffff"/>
    <text x="68" y="22" font-weight="700" font-size="22" letter-spacing="3" fill="#eaf0fb">FAN ENGAGEMENT</text>
    <text x="69" y="44" font-family="'Courier New',monospace" font-size="13" letter-spacing="2.5" fill="#6a7c99">AZURE CLOUD &amp; AI · REFERENCE SIMULATOR</text>
  </g>

  <!-- headline -->
  <g font-family="'Helvetica Neue',Arial,sans-serif" font-weight="700" fill="#ffffff">
    <text x="80" y="290" font-size="70">The fan app —</text>
    <text x="80" y="372" font-size="70">and its <tspan fill="#2899f5">Azure brain.</tspan></text>
  </g>

  <!-- subline -->
  <g font-family="'Helvetica Neue',Arial,sans-serif" font-weight="500" font-size="24" fill="#9fb0cc">
    <text x="82" y="436">A Major League Sports platform — showcased with the</text>
    <text x="82" y="470">NBA — as an Xcode-style device simulator that lights</text>
    <text x="82" y="504">up the Azure reference architecture 360°.</text>
  </g>

  <!-- chips -->
  <g font-family="'Courier New',monospace" font-size="15" fill="#a9b8d2">
    <rect x="80" y="544" width="142" height="38" rx="19" fill="#101626" stroke="#2c3a56"/>
    <text x="100" y="568">Edge · AI · Data</text>
    <rect x="236" y="544" width="176" height="38" rx="19" fill="#101626" stroke="#2c3a56"/>
    <text x="256" y="568">Realtime · SignalR</text>
    <rect x="426" y="544" width="180" height="38" rx="19" fill="#101626" stroke="#2c3a56"/>
    <text x="446" y="568">Live brain rationale</text>
  </g>
</svg>
